<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BlastCSS Marketing Benchmark</title>
    <link rel="stylesheet" href="../dist/blast.min.css">
  </head>
  <body>
    <main class="b-container py-8 b-stack" style="--b-stack-gap: var(--b-8)">
      <section class="b-grid items-center" style="--b-grid-min: 22rem">
        <div class="b-stack">
          <span class="b-badge">Benchmark</span>
          <h1 class="text-balance">Marketing Benchmark</h1>
          <p class="text-muted text-lg">Hero, feature cards, badges, buttons, and responsive layout.</p>
          <div class="b-cluster"><a class="b-btn" href="#">Start</a><a class="b-btn b-btn-secondary" href="#">Docs</a></div>
        </div>
        <div class="b-card">
          <div class="b-card-body b-stack">
            <div class="b-skeleton" style="min-height: 12rem"></div>
            <div class="b-skeleton"></div>
            <div class="b-skeleton" style="max-width: 70%"></div>
          </div>
        </div>
      </section>
      <section class="b-grid">
        <article class="b-card"><div class="b-card-body"><h2 class="text-xl">Small</h2><p class="text-muted mb-0">Strict size budgets.</p></div></article>
        <article class="b-card"><div class="b-card-body"><h2 class="text-xl">Portable</h2><p class="text-muted mb-0">Works everywhere CSS works.</p></div></article>
        <article class="b-card"><div class="b-card-body"><h2 class="text-xl">Tokenized</h2><p class="text-muted mb-0">Theme through CSS variables.</p></div></article>
      </section>
    </main>
  </body>
</html>
