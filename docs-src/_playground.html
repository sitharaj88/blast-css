<header class="docs-article-head" style="border:0; padding-block-end: var(--b-4); margin-block-end: var(--b-4)">
  <div class="docs-eyebrow">Tools</div>
  <h1>Playground</h1>
  <p class="docs-lede">Live HTML + CSS editor with token controls. Edit on the left, preview on the right. Share a link that restores everything.</p>
</header>

<div class="pg" data-pg-root>
  <header class="pg-toolbar">
    <div class="pg-toolbar-group pg-toolbar-presets">
      <span class="pg-toolbar-label">Preset</span>
      <select class="b-select b-input-sm" data-pg-preset aria-label="Choose preset">
        <option value="buttons">Buttons</option>
        <option value="form">Form</option>
        <option value="card">Card</option>
        <option value="dashboard">Dashboard</option>
        <option value="hero">Hero</option>
      </select>
    </div>

    <div class="pg-toolbar-group pg-toolbar-bp" role="radiogroup" aria-label="Preview viewport">
      <button type="button" class="pg-bp is-active" data-pg-bp="full" aria-label="Full width">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M6 22h12"/></svg>
      </button>
      <button type="button" class="pg-bp" data-pg-bp="tablet" aria-label="Tablet">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/></svg>
      </button>
      <button type="button" class="pg-bp" data-pg-bp="mobile" aria-label="Mobile">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg>
      </button>
    </div>

    <div class="pg-toolbar-group pg-toolbar-actions">
      <button type="button" class="b-btn b-btn-ghost b-btn-sm" data-pg-theme>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
        <span>Theme</span>
      </button>
      <button type="button" class="b-btn b-btn-ghost b-btn-sm" data-pg-tokens-toggle aria-expanded="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Tokens</span>
      </button>
      <button type="button" class="b-btn b-btn-secondary b-btn-sm" data-pg-share>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.59 13.51 6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
        <span>Share</span>
      </button>
      <button type="button" class="b-btn b-btn-secondary b-btn-sm" data-pg-reset>Reset</button>
    </div>
  </header>

  <div class="pg-body">
    <div class="pg-editor-pane">
      <div class="pg-editor-bar">
        <div class="pg-editor-tabs" role="tablist">
          <button type="button" class="pg-editor-tab is-active" role="tab" aria-selected="true" data-pg-tab="html">
            <span class="pg-tab-dot" style="background: oklch(72% 0.16 24)"></span>
            HTML
          </button>
          <button type="button" class="pg-editor-tab" role="tab" aria-selected="false" data-pg-tab="css">
            <span class="pg-tab-dot" style="background: oklch(72% 0.18 264)"></span>
            CSS
          </button>
        </div>
        <div class="pg-editor-status" data-pg-status>Ready</div>
      </div>

      <div class="pg-editor-area">
        <textarea class="pg-editor" data-pg-editor="html" aria-label="HTML editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
        <textarea class="pg-editor" data-pg-editor="css" aria-label="CSS editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" hidden></textarea>
      </div>
    </div>

    <div class="pg-preview-pane">
      <div class="pg-preview-bar">
        <div class="pg-preview-window">
          <span></span><span></span><span></span>
          <span class="pg-preview-url" data-pg-preview-url>preview · auto</span>
        </div>
        <div class="pg-preview-meta">
          <span data-pg-bp-label>Full</span>
        </div>
      </div>
      <div class="pg-preview-stage" data-pg-preview-stage>
        <iframe class="pg-preview-frame" data-pg-preview title="Live preview" sandbox="allow-scripts"></iframe>
      </div>
    </div>
  </div>

  <div class="pg-tokens" data-pg-tokens hidden role="region" aria-label="Design tokens">
    <div class="pg-tokens-head">Design tokens</div>
    <div class="pg-tokens-body">
      <div class="playground-control">
        <label for="pg-hue">Primary hue (<span data-out="hue">264</span>°)</label>
        <input id="pg-hue" type="range" class="b-range" min="0" max="360" value="264" data-pg-token="hue">
      </div>
      <div class="playground-control">
        <label for="pg-chroma">Chroma (<span data-out="chroma">0.21</span>)</label>
        <input id="pg-chroma" type="range" class="b-range" min="0" max="0.4" step="0.01" value="0.21" data-pg-token="chroma">
      </div>
      <div class="playground-control">
        <label for="pg-radius">Radius (<span data-out="radius">0.5</span>rem)</label>
        <input id="pg-radius" type="range" class="b-range" min="0" max="1.5" step="0.05" value="0.5" data-pg-token="radius">
      </div>
      <div class="playground-control">
        <label for="pg-density">Control height (<span data-out="density">2.5</span>rem)</label>
        <input id="pg-density" type="range" class="b-range" min="2" max="3.25" step="0.05" value="2.5" data-pg-token="density">
      </div>
      <div class="playground-control">
        <label for="pg-font">Heading weight (<span data-out="font">720</span>)</label>
        <input id="pg-font" type="range" class="b-range" min="500" max="900" step="10" value="720" data-pg-token="font">
      </div>
    </div>
  </div>
</div>

<script defer src="./playground.js"></script>
