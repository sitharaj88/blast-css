name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # Required job: build, static checks, render+axe, interactions.
  # Deterministic on any runner OS — must pass for the build to be
  # green. Visual regression lives in a separate, non-blocking job.
  # ─────────────────────────────────────────────────────────────
  test:
    name: Build and verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Static verify
        run: npm run test:static

      - name: Browser verify (render + interactions)
        run: npm run test:browser

      - name: Pack dry-run
        run: npm pack --dry-run

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Optional job: pixel-level visual regression on Chromium only.
  # Cross-OS font rendering differences make this flaky in CI by
  # design, so it runs as `continue-on-error` and uploads the diff
  # report as an artifact for review. Refresh local baselines with
  # `npm run test:visual:update` when intentional UI changes land.
  # ─────────────────────────────────────────────────────────────
  visual:
    name: Visual regression (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build && npm run build:docs

      - name: Visual baselines
        run: npm run test:browser:visual

      - name: Upload visual diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff
          path: playwright-report/
          retention-days: 14
